services:
  vault-finance:
    build: .
    container_name: vault-finance
    ports:
      - '8088:3001'
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
